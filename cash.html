<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Cash Collection – Wathanzi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const app=initializeApp({apiKey:"AIzaSyCiIpEt33eBLmna3YdXEbXZ4wLP5CLD20w",authDomain:"wathanzi.firebaseapp.com",databaseURL:"https://wathanzi-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"wathanzi",storageBucket:"wathanzi.firebasestorage.app",messagingSenderId:"456356745959",appId:"1:456356745959:web:aeb1adaeba3cc73cbdc842"});
    const db=getDatabase(app);
    window._fbPush=async(path,data)=>await push(ref(db,path),data);
    window._fbReady=true;
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:linear-gradient(135deg,#0a1628,#1a3a6b,#2780e3);font-family:'Montserrat',sans-serif;padding:20px 16px 60px}
    .card{background:#fff;border-radius:20px;padding:24px 20px;max-width:480px;margin:0 auto;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    .header{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid #eef2ff}
    .brand{font-family:'Playfair Display',serif;font-size:20px;color:#1a3a6b;font-weight:700}
    .date-chip{background:#eef2ff;color:#1a3a6b;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;display:inline-block;margin-top:10px}
    .section{margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid #eef2ff}
    .sec-title{font-size:13px;font-weight:700;color:#1a3a6b;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
    .label{display:block;font-size:11px;font-weight:700;color:#333;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
    .input{width:100%;padding:10px 14px;border:1.5px solid #dde3f0;border-radius:10px;font-size:15px;color:#1a1a2e;background:#f8faff;outline:none;box-sizing:border-box;font-family:'Montserrat',sans-serif}
    .field{margin-bottom:14px;flex:1}
    .channel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ch-card{background:#f8faff;border:2px solid #dde3f0;border-radius:14px;padding:16px 14px}
    .ch-name{font-size:13px;font-weight:700;color:#1a3a6b;margin-bottom:10px}
    .total-bar{background:#eef2ff;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#1a3a6b,#2780e3);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;margin-top:8px}
    .saving{background:#fff8e1;border:1px solid #ffe082;color:#f57f17;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;text-align:center}
    .error{background:#fff0f0;border:1px solid #ffcccc;color:#c0392b;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px}
    .done-screen{text-align:center;padding:36px 0}
    .summary-box{background:#eef2ff;border-radius:12px;padding:16px 20px;margin-top:20px;text-align:left}
    .summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #dde3f0;font-size:14px;color:#1a1a2e}
  </style>
</head>
<body>
<div class="card" id="app"></div>
<script>
const CHANNELS=["Good Scoop","Balaram Kulfi","B2B","Cart"];
let data=CHANNELS.map(()=>({cash:"",upi:""}));
let notes="",step="form",error="",saving=false;

function getToday(){return new Date().toISOString().slice(0,10)}
function getTodayLabel(){return new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
function getTotal(){return data.reduce((s,d)=>s+(parseFloat(d.cash)||0)+(parseFloat(d.upi)||0),0)}

async function save(){
  saving=true;render();
  const channels=CHANNELS.map((name,i)=>({channel:name,cash:parseFloat(data[i].cash)||0,upi:parseFloat(data[i].upi)||0,total:(parseFloat(data[i].cash)||0)+(parseFloat(data[i].upi)||0)}));
  const record={type:"cash",date:getToday(),channels,grandTotal:getTotal(),notes,submittedAt:new Date().toISOString()};
  try{
    await window._fbPush("cash/"+getToday().replace(/-/g,"_"),record);
    step="done";
  }catch(e){error="Failed to save. Please try again.";}
  saving=false;render();
}

function render(){
  const app=document.getElementById("app");
  if(step==="done"){
    app.innerHTML=`
      <div class="done-screen">
        <div style="font-size:60px">✅</div>
        <div style="font-family:'Playfair Display',serif;font-size:22px;color:#1a3a6b;font-weight:700;margin-top:14px">Collection Logged!</div>
        <div style="color:#888;font-size:13px;margin-top:6px">${getTodayLabel()}</div>
        <div class="summary-box">
          ${CHANNELS.map((name,i)=>`<div class="summary-row"><span>${name}</span><strong>₹${(parseFloat(data[i].cash)||0)+(parseFloat(data[i].upi)||0)}</strong></div>`).join("")}
          <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:700;color:#1a3a6b"><span>Grand Total</span><span>₹${getTotal()}</span></div>
        </div>
        <div style="margin-top:16px;font-size:13px;color:#999">Synced to dashboard ✓</div>
      </div>`;
    return;
  }

  const channelCards=CHANNELS.map((name,i)=>`
    <div class="ch-card">
      <div class="ch-name">${name}</div>
      <div class="field"><label class="label">Cash ₹</label><input class="input" type="number" min="0" placeholder="0" value="${data[i].cash}" oninput="data[${i}].cash=this.value;updateTotal()"/></div>
      <div class="field"><label class="label">UPI ₹</label><input class="input" type="number" min="0" placeholder="0" value="${data[i].upi}" oninput="data[${i}].upi=this.value;updateTotal()"/></div>
    </div>`).join("");

  app.innerHTML=`
    <div class="header">
      <div class="brand">WATHANZI</div>
      <div style="font-size:12px;color:#888;margin-top:4px;text-transform:uppercase;letter-spacing:1px">Daily Cash Collection</div>
      <div class="date-chip">${getTodayLabel()}</div>
    </div>
    <div class="total-bar">
      <div style="font-size:13px;color:#555;font-weight:600">Total Collected</div>
      <div style="font-size:22px;font-weight:700;color:#1a3a6b;font-family:'Playfair Display',serif" id="grand-total">₹${getTotal()}</div>
    </div>
    <div class="section">
      <div class="sec-title">💰 Collection by Channel</div>
      <div class="channel-grid">${channelCards}</div>
    </div>
    <div class="section">
      <div class="sec-title">📝 Notes</div>
      <textarea class="input" style="height:70px;resize:vertical" placeholder="Any discrepancies or notes..." oninput="notes=this.value">${notes}</textarea>
    </div>
    ${saving?`<div class="saving">⏳ Saving to dashboard...</div>`:""}
    ${error?`<div class="error">${error}</div>`:""}
    <button class="submit-btn" onclick="submitForm()" ${saving?"disabled":""}>Log Collection ✓</button>`;
}

function updateTotal(){const el=document.getElementById("grand-total");if(el)el.textContent="₹"+getTotal();}
function submitForm(){if(getTotal()===0){error="Please enter at least one amount.";render();return;}error="";save();}
function waitAndRender(){if(window._fbReady)render();else setTimeout(waitAndRender,100);}
waitAndRender();
</script>
</body>
</html>
